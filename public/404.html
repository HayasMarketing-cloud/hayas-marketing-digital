<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Robots-Tag" content="noindex, nofollow">
  <title>404 - Página no encontrada | Hayas Marketing</title>
  <meta name="description" content="La página que buscas no existe. Descubre nuestras soluciones de marketing digital, IA y CRM.">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4D9A00 0%, #00467E 100%);
      color: #ffffff;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 600px;
      animation: fadeIn 0.6s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .error-code {
      font-size: clamp(80px, 15vw, 160px);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    h1 {
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 600;
      margin-bottom: 16px;
    }
    
    p {
      font-size: clamp(16px, 3vw, 18px);
      line-height: 1.6;
      margin-bottom: 32px;
      opacity: 0.9;
    }
    
    .cta-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    
    .btn {
      display: inline-block;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.3s ease;
      min-width: 200px;
    }
    
    .btn-primary {
      background: #ffffff;
      color: #00467E;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.5);
    }
    
    .links {
      margin-top: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      font-size: 14px;
    }
    
    .links a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    
    .links a:hover {
      color: #ffffff;
      text-decoration: underline;
    }
    
    @media (min-width: 640px) {
      .cta-container {
        flex-direction: row;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Página no encontrada</h1>
    <p>Lo sentimos, la página que buscas no existe o ha sido movida. Te ayudamos a encontrar lo que necesitas.</p>
    
    <div class="cta-container">
      <a href="/es" class="btn btn-primary">Ir al Inicio</a>
      <a href="/es/contacto" class="btn btn-secondary">Contactar</a>
    </div>
    
    <div class="links">
      <a href="/es/servicios">Servicios</a>
      <a href="/es/soluciones/impulsa-tu-marca">Soluciones</a>
      <a href="/es/casos-exito">Casos de Éxito</a>
      <a href="/es/blog">Blog</a>
      <a href="/es/nosotros">Nosotros</a>
    </div>
  </div>

</body>
</html>
